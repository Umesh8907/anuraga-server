name: Deploy Backend to Dev

on:
  push:
    branches:
      - dev

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run Lint
        run: npm run lint

  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: registry.pocapi.in
          username: ${{ secrets.REGISTRY_UNAME }}
          password: ${{ secrets.REGISTRY_PWD }}
          
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: registry.pocapi.in/anuraga-server:dev

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_SERVER_IP }}
          username: root
          password: ${{ secrets.SSH_SERVER_PWD }}
          script: |
            cd /data/docker-compose
            
            docker login registry.pocapi.in -u ${{ secrets.REGISTRY_UNAME }} -p "${{ secrets.REGISTRY_PWD }}"
            
            docker compose -f anuraga_server_docker_compose.yml pull
            
            docker compose -f anuraga_server_docker_compose.yml up -d
